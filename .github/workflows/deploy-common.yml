name: Deploy Common

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        id: tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "tags=ghcr.io/gc-stats/riotrelay:latest,ghcr.io/gc-stats/riotrelay:${RELEASE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/gc-stats/riotrelay:preprod" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via Webhook
        env:
          SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            HOOK_ID="deploy-riotrelay"
          else
            HOOK_ID="deploy-riotrelay-preprod"
          fi

          PAYLOAD='{"ref":"refs/heads/main"}'

          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | cut -d' ' -f2)

          curl -sf -X POST "https://deploy.gc-stats.app/hooks/${HOOK_ID}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -d "$PAYLOAD"
